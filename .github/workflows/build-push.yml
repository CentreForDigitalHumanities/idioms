# This workflow builds container images for specific cases and pushes them in the container registry

name: IdiomsDB-build-push-housekeep

on:
  workflow_dispatch:
  push:
    branches:
        - 'develop'
        - 'feature/**'
        - 'bugfix/**'
        - 'hotfix/**'
        - 'release/**'
  # CI aiming to help reviewing PRs
  pull_request:
    branches:
      - 'main'
      - 'develop'
permissions:
  contents: write
  packages: write

jobs:
  build-push-verify:
    runs-on: ubuntu-latest
    steps:
    -
      name: Checkout code
      uses: actions/checkout@v4
    -
      name: Login to GitHub Container Registry
      uses: docker/login-action@v3 # this action does it securely rather than using docker login -u <user> -p <pass/token>
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    -
      name: Build and Push
      run: |
        docker build -f Containerfile  --target local --tag ghcr.io/centrefordigitalhumanities/idioms:${{ github.sha }} .
        docker push ghcr.io/centrefordigitalhumanities/idioms:${{ github.sha }}
        # ${{ github.ref_name }} will be: the name of the current branch OR git tag OR pull request
        REF_NOSLASH=$(echo "${{ github.ref_name }}" | tr / _)
        docker tag ghcr.io/centrefordigitalhumanities/idioms:${{ github.sha }} ghcr.io/centrefordigitalhumanities/idioms:$REF_NOSLASH
        docker push ghcr.io/centrefordigitalhumanities/idioms:$REF_NOSLASH
    -
      name: Verify non-root
      run: |
        REF_NOSLASH=$(echo "${{ github.ref_name }}" | tr / _)
        docker pull ghcr.io/centrefordigitalhumanities/idioms:$REF_NOSLASH
        set +e
        timeout 7 docker run --rm -p 8001:8001 -u 1000:0 ghcr.io/centrefordigitalhumanities/idioms:$REF_NOSLASH
        if [ $(echo $?) -eq 124 ]; then
          echo "Successfully timed out after 7 secs."
        else
          echo "Error with docker run."
        fi

  delete-untagged-images:
    runs-on: ubuntu-latest
    needs: build-push-verify
    steps:
    -
      name: Package/Container Cleanup action in ghcr.io
      uses: dataaxiom/ghcr-cleanup-action@v1
      with:
        delete-untagged: true
        exclude-tags: v*
        keep-n-tagged: 12
        # dry-run: true
        # older-than: 1 year
